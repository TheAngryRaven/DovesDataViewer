name = "beta-proxy"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# Attaching a custom_domain route makes Cloudflare provision the DNS record and
# TLS certificate for beta.perchwerks.com automatically — do NOT create any DNS
# records by hand. The zone perchwerks.com must already be in this account.
routes = [
  { pattern = "beta.perchwerks.com", custom_domain = true }
]
